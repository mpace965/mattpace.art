<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cardboard — matt's pixel library</title>
    <link rel="icon" href="/favicon.png" type="image/png" />
    <style>
      body {
        font-family: monospace;
        max-width: 900px;
        margin: 4rem auto;
        padding: 0 1.5rem;
      }

      header {
        margin-bottom: 2rem;
      }

      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.4rem;
      }

      .meta {
        font-size: 0.85rem;
        color: #888;
        margin: 0;
      }

      nav {
        font-size: 0.85rem;
        margin-bottom: 2.5rem;
      }

      nav a {
        color: #888;
        text-decoration: none;
      }

      nav a:hover {
        text-decoration: underline;
      }

      .variants {
        display: flex;
        flex-direction: column;
        gap: 3rem;
      }

      .variant {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }

      .variant-name {
        font-size: 0.85rem;
        color: #888;
      }

      .variant-name a {
        color: inherit;
        text-decoration: none;
      }

      .variant-name a:hover {
        text-decoration: underline;
      }

      .variant img {
        max-width: 100%;
        display: block;
      }

      .empty {
        color: #888;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <nav><a href="/">← matt's pixel library</a></nav>
    <header>
      <h1>cardboard</h1>
      <p class="meta">greyscale cardboard texture with a grid of inverted circles.</p>
      <p class="meta">2026-03-09</p>
    </header>
    <div class="variants">
      <div class="variant" id="nine">
        <img src="nine.png" alt="nine" loading="lazy" />
      </div>
    </div>
  </body>
</html>
