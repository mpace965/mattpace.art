[tools]
python = "3.14.3"
uv = "latest"
node = "lts"

[tasks.test]
run = "uv run --directory framework pytest"
description = "Run framework tests"

[tasks.lint]
run = [
    "uv run --directory framework ruff check src tests",
    "uv run --directory sketches ruff check .",
]
description = "Lint framework and sketches"

[tasks."sketches:dev"]
run = "uv run dev"
description = "Start sketch dev server"

[tasks."site:dev"]
run = "npm --prefix site run dev"
description = "Serve static site with 11ty dev server"

[tasks."sketches:build"]
run = "uv run build"
description = "Build sketch bundles"

[tasks."site:build"]
run = "npm --prefix site run build"
description = "Generate static site"

[tasks.build]
run = "mise run sketches:build && mise run site:build"
description = "Build sketch bundles then generate static site"

[tasks."sketches:clean"]
run = "rm -rf sketches/bundle"
description = "Delete all sketch bundle directories"

[tasks."site:clean"]
run = "rm -rf site/dist"
description = "Delete built site output"

[tasks.clean]
depends = ["sketches:clean", "site:clean"]
description = "Delete all build outputs (sketches .workdir + site dist)"

[tasks.deploy]
depends = ["build"]
run = "site/scripts/deploy.sh"
description = "Build and force-push site/dist to gh-pages branch"
