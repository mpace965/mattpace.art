<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>matt's pixel library</title>
    <style>
      body {
        font-family: monospace;
        max-width: 800px;
        margin: 4rem auto;
        padding: 0 1.5rem;
        min-height: calc(100vh - 8rem);
        display: flex;
        flex-direction: column;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 3rem;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        grid-template-columns: max-content 1fr;
        column-gap: 1.5rem;
        row-gap: 1rem;
      }

      li {
        display: contents;
      }

      .date {
        color: #888;
        white-space: nowrap;
      }

      .info {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      a {
        color: inherit;
      }

      .description {
        font-size: 0.85rem;
        color: #888;
      }

      footer {
        margin-top: auto;
        padding-top: 4rem;
        font-size: 0.8rem;
        color: #888;
      }
    </style>
  </head>
  <body>
    <h1>matt's pixel library</h1>
    <ul>
      {% for entry in entries %}
      <li>
        <span class="date">{{ entry.date }}</span>
        <div class="info">
          <a href="/{{ entry.slug }}/">{{ entry.name }}</a>
          {% if entry.description %}
          <span class="description">{{ entry.description }}</span>
          {% endif %}
        </div>
      </li>
      {% endfor %}
    </ul>
  </body>
</html>
