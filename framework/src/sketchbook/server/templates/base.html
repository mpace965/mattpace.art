<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Sketchbook{% endblock %}</title>
  <style>
    :root {
      --color-bg: #111;
      --color-surface: #161616;
      --color-surface-2: #1a1a1a;
      --color-border: #2a2a2a;
      --color-border-2: #333;
      --color-border-hover: #555;
      --color-text: #eee;
      --color-text-muted: #aaa;
      --color-text-dim: #555;
      --color-accent: #7af;
      --color-accent-hover-bg: #1a2a3a;
      --color-dirty: #f90;
      --color-error: #c44;
      --color-error-msg: #f88;
      --color-error-bg: #300;
      --color-ok: #cfc;
      --color-ok-bg: #0d1a0d;
      --color-input-bg: #222;
      --color-input-border: #444;
      --color-btn-bg: #333;
      --color-btn-bg-hover: #444;
      --color-btn-border: #555;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --color-bg: #fff;
        --color-surface: #fafafa;
        --color-surface-2: #f5f5f5;
        --color-border: #ddd;
        --color-border-2: #ddd;
        --color-border-hover: #999;
        --color-text: #111;
        --color-text-muted: #666;
        --color-text-dim: #999;
        --color-accent: #0066bb;
        --color-accent-hover-bg: #e8f0ff;
        --color-dirty: #c70;
        --color-error: #c44;
        --color-error-msg: #c00;
        --color-error-bg: #fde8e8;
        --color-ok: #080;
        --color-ok-bg: #f0fff0;
        --color-input-bg: #fff;
        --color-input-border: #ccc;
        --color-btn-bg: #e8e8e8;
        --color-btn-bg-hover: #d8d8d8;
        --color-btn-border: #ccc;
      }
    }

    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: var(--color-bg); color: var(--color-text); font-family: monospace; display: flex; flex-direction: column; height: 100vh; }

    #toolbar {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1rem; background: var(--color-surface-2); border-bottom: 1px solid var(--color-border-2);
      flex-shrink: 0;
    }
    #toolbar h2 { margin: 0; font-size: 0.9rem; flex: 1; }
    #toolbar h2 a { color: var(--color-text); text-decoration: none; }
    #toolbar h2 a:hover { text-decoration: underline; }
    #toolbar h2 .sep { color: var(--color-text-dim); margin: 0 0.3rem; }
    #preset-label { font-size: 0.8rem; color: var(--color-text-muted); white-space: nowrap; }
    #dirty-indicator { color: var(--color-dirty); }
    #preset-select { background: var(--color-input-bg); color: var(--color-text); border: 1px solid var(--color-input-border); padding: 0.2rem 0.4rem; font-family: monospace; font-size: 0.8rem; }
    .btn { background: var(--color-btn-bg); color: var(--color-text); border: 1px solid var(--color-btn-border); padding: 0.2rem 0.6rem; cursor: pointer; font-family: monospace; font-size: 0.8rem; }
    .btn:hover:not(:disabled) { background: var(--color-btn-bg-hover); }
    .btn:disabled { opacity: 0.35; cursor: default; }

    #content { display: flex; flex: 1; overflow: hidden; }

    /* Shared step body layout */
    .step-card-body { padding: 0.75rem; display: flex; gap: 1rem; align-items: flex-start; }
    .step-card-params { flex-shrink: 0; width: 260px; }
    .step-card-params:empty { display: none; }
    .step-card-output { flex: 1; min-width: 0; }
    .step-card-output .error-msg { color: var(--color-error-msg); font-size: 0.8rem; white-space: pre-wrap; padding: 0.5rem; background: var(--color-error-bg); border-radius: 3px; margin-bottom: 0.5rem; display: none; }
    .step-card-output img { max-width: 100%; width: auto; display: block; border-radius: 2px; margin: 0 auto; }
    .step-card-output pre.text-output { margin: 0 auto; padding: 0.75rem; font-size: 0.9rem; color: var(--color-ok); background: var(--color-ok-bg); border-radius: 3px; white-space: pre-wrap; word-break: break-all; text-align: center; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <div id="toolbar">
    <h2>{% block toolbar_title %}Sketchbook{% endblock %}</h2>
    {% block toolbar_controls %}
    <span id="preset-label">preset: <span id="dirty-indicator"></span></span>
    <select id="preset-select"><option value="">— untitled —</option></select>
    <button class="btn" id="btn-save" disabled>Save</button>
    <button class="btn" id="btn-save-as">Save as…</button>
    <button class="btn" id="btn-new">New</button>
    {% endblock %}
  </div>

  <div id="content">
    {% block content %}{% endblock %}
  </div>

  {% block page_scripts %}
  <script type="module">
    import { Pane } from "https://cdn.jsdelivr.net/npm/tweakpane@4/+esm";

    const SKETCH_ID = "{{ sketch_id }}";
    const URL_PREFIX = "{{ url_prefix | default('') }}";
    const PATCH_URL = `${URL_PREFIX}/api/sketches/${SKETCH_ID}/params`;
    const PRESETS_URL = `${URL_PREFIX}/api/sketches/${SKETCH_ID}/presets`;

    // -----------------------------------------------------------------------
    // Presets
    // -----------------------------------------------------------------------

    async function fetchAndRenderPresets() {
      const res = await fetch(PRESETS_URL);
      if (!res.ok) return;
      renderPresets(await res.json());
    }

    function renderPresets({ presets, active }) {
      const select = document.getElementById("preset-select");
      const dirty = document.getElementById("dirty-indicator");
      const btnSave = document.getElementById("btn-save");

      select.innerHTML = '<option value="">— untitled —</option>';
      for (const name of presets) {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      }

      select.value = active.based_on ?? "";
      dirty.textContent = active.dirty ? "*" : "";
      btnSave.disabled = !active.based_on || !active.dirty;
    }

    function markDirtyLocally() {
      document.getElementById("dirty-indicator").textContent = "*";
      document.getElementById("btn-save").disabled =
        !document.getElementById("preset-select").value;
    }

    document.getElementById("preset-select").addEventListener("change", async (e) => {
      const name = e.target.value;
      if (!name) return;
      await fetch(`${PRESETS_URL}/${name}/load`, { method: "POST" });
      await fetchAndRenderPresets();
    });

    document.getElementById("btn-save").addEventListener("click", async () => {
      const current = document.getElementById("preset-select").value;
      if (current) {
        await fetch(PRESETS_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: current }),
        });
        await fetchAndRenderPresets();
      } else {
        await saveAs();
      }
    });

    document.getElementById("btn-save-as").addEventListener("click", saveAs);

    document.getElementById("btn-new").addEventListener("click", async () => {
      await fetch(`${PRESETS_URL}/new`, { method: "POST" });
      await fetchAndRenderPresets();
    });

    async function saveAs() {
      const name = prompt("Preset name:");
      if (!name) return;
      await fetch(PRESETS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name }),
      });
      await fetchAndRenderPresets();
    }

    // -----------------------------------------------------------------------
    // Shared Tweakpane helper
    // -----------------------------------------------------------------------

    // Set to true during programmatic refreshPanes() to suppress change side-effects.
    let _refreshing = false;

    function buildPane(container, stepId, params) {
      const pane = new Pane({ container });
      const state = {};
      for (const [name, spec] of Object.entries(params)) {
        state[name] = spec.value;
        const opts = {};
        if (spec.min !== undefined) opts.min = spec.min;
        if (spec.max !== undefined) opts.max = spec.max;
        if (spec.step !== undefined) opts.step = spec.step;
        if (spec.label !== undefined) opts.label = spec.label;
        if (spec.options !== undefined) opts.options = Object.fromEntries(spec.options.map(o => [o, o]));
        const debounceMs = spec.debounce ?? 0;
        let debounceTimer = null;
        const sendPatch = (value) => fetch(PATCH_URL, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ step_id: stepId, param_name: name, value }),
        });
        pane.addBinding(state, name, opts).on("change", (ev) => {
          if (_refreshing) return;
          markDirtyLocally();
          if (debounceMs > 0) {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => sendPatch(ev.value), debounceMs);
          } else {
            sendPatch(ev.value);
          }
        });
      }
      return { pane, state };
    }

    // -----------------------------------------------------------------------
    // Page-specific init (Tweakpane + WebSocket)
    // -----------------------------------------------------------------------

    {% block scripts %}function init() {}{% endblock %}

    fetchAndRenderPresets();
    init();
  </script>
  {% endblock %}
</body>
</html>
